<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="fieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#fieldGradient)" stroke="#0f172a" stroke-width="2"/>

  <!-- Football/Soccer ball pattern -->
  <g fill="#ffffff" opacity="0.95">
    <!-- Center pentagon -->
    <path d="M50,35 L58,40 L55,50 L45,50 L42,40 Z"/>

    <!-- Top hexagon -->
    <path d="M50,20 L60,25 L58,35 L42,35 L40,25 Z"/>

    <!-- Top-right hexagon -->
    <path d="M58,40 L70,38 L75,48 L70,58 L58,56 L55,50 Z"/>

    <!-- Bottom-right hexagon -->
    <path d="M55,50 L58,56 L55,68 L45,68 L42,56 L45,50 Z"/>

    <!-- Bottom-left hexagon -->
    <path d="M45,50 L42,56 L30,58 L25,48 L30,38 L42,40 Z"/>

    <!-- Top-left hexagon -->
    <path d="M42,40 L40,25 L28,28 L25,38 L30,38 Z"/>
  </g>

  <!-- Ball stitching lines -->
  <g stroke="#0f172a" stroke-width="1.5" fill="none" opacity="0.3">
    <path d="M50,35 L58,40 L55,50 L45,50 L42,40 Z"/>
    <path d="M50,20 L50,35"/>
    <path d="M42,40 L40,25"/>
    <path d="M58,40 L60,25"/>
    <path d="M55,50 L58,56"/>
    <path d="M45,50 L42,56"/>
    <path d="M58,56 L70,58"/>
    <path d="M42,56 L30,58"/>
  </g>

  <!-- Highlight -->
  <circle cx="38" cy="32" r="8" fill="#ffffff" opacity="0.2"/>
</svg>
