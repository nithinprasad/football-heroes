# This file deploys a preview of your app to Firebase Hosting for each PR

name: Deploy to Firebase Hosting on PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    # Ensures previews are only created for PRs from the same repository
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js with dependency caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Install dependencies (fixes Rollup optional dependency issue)
      - name: Renove Lock
        run: rm -f package-lock.json
      # 3. Install dependencies (fixes Rollup optional dependency issue)
      - name: Install dependencies
        run: npm install

      # 4. Build the Vite application
      - name: Build project
        run: npm run build

      # 5. Deploy preview to Firebase Hosting
      - name: Deploy to Firebase Hosting (Preview)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FOOTBALL_HEROES_8188B }}
          projectId: football-heroes-8188b
          # Optional: specify preview channel expiration (default is 7 days)
          expires: 7d